name: mo_code
description: "Mobile AI coding agent - terminal-style UI with OpenCode backend"
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  speech_to_text: ^7.0.0
  permission_handler: ^11.1.0
  flutter_markdown: ^0.7.7+1
  flutter_highlighter: ^0.1.1

  # --- Premium UI packages ---
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  flutter_slidable: ^3.1.1
  animations: ^2.0.11
  shimmer: ^3.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700