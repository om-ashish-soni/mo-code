<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ADA4FF"/>
      <stop offset="100%" stop-color="#8B7FFF"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161625"/>
      <stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
    <linearGradient id="antennaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EE0A0"/>
      <stop offset="100%" stop-color="#8B7FFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0F0F1A"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#2A2A45" stroke-width="3"/>

  <!-- Antenna -->
  <line x1="256" y1="108" x2="256" y2="68" stroke="url(#antennaGrad)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="60" r="12" fill="#5EE0A0" filter="url(#glow)"/>
  <circle cx="256" cy="60" r="6" fill="#FFFFFF" opacity="0.8"/>

  <!-- Head / body — rounded rectangle robot -->
  <rect x="128" y="120" width="256" height="220" rx="48" ry="48" fill="url(#bodyGrad)"/>

  <!-- Face screen — dark inset -->
  <rect x="156" y="150" width="200" height="130" rx="28" ry="28" fill="url(#screenGrad)"/>
  <rect x="156" y="150" width="200" height="130" rx="28" ry="28" fill="none" stroke="#3D3670" stroke-width="2"/>

  <!-- Eyes — glowing terminal cursors -->
  <rect x="196" y="192" width="36" height="44" rx="8" fill="#5EE0A0" filter="url(#glow)"/>
  <rect x="280" y="192" width="36" height="44" rx="8" fill="#5EE0A0" filter="url(#glow)"/>

  <!-- Eye shine -->
  <rect x="200" y="196" width="12" height="16" rx="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="284" y="196" width="12" height="16" rx="4" fill="#FFFFFF" opacity="0.4"/>

  <!-- Mouth — code prompt "> _" -->
  <text x="220" y="265" font-family="monospace" font-size="28" font-weight="bold" fill="#8B7FFF" opacity="0.8">&gt; _</text>

  <!-- Side ears / vents -->
  <rect x="108" y="180" width="18" height="50" rx="9" fill="#8B7FFF" opacity="0.7"/>
  <rect x="386" y="180" width="18" height="50" rx="9" fill="#8B7FFF" opacity="0.7"/>

  <!-- Arms -->
  <!-- Left arm -->
  <rect x="92" y="250" width="30" height="80" rx="15" fill="url(#bodyGrad)" opacity="0.85"/>
  <!-- Left hand — code bracket < -->
  <text x="93" y="370" font-family="monospace" font-size="44" font-weight="bold" fill="#8B7FFF" filter="url(#softGlow)">&lt;</text>

  <!-- Right arm -->
  <rect x="390" y="250" width="30" height="80" rx="15" fill="url(#bodyGrad)" opacity="0.85"/>
  <!-- Right hand — code bracket > -->
  <text x="387" y="370" font-family="monospace" font-size="44" font-weight="bold" fill="#8B7FFF" filter="url(#softGlow)">&gt;</text>

  <!-- Legs / base -->
  <rect x="190" y="340" width="48" height="60" rx="16" fill="url(#bodyGrad)" opacity="0.9"/>
  <rect x="274" y="340" width="48" height="60" rx="16" fill="url(#bodyGrad)" opacity="0.9"/>

  <!-- Feet -->
  <rect x="180" y="390" width="68" height="24" rx="12" fill="#8B7FFF"/>
  <rect x="264" y="390" width="68" height="24" rx="12" fill="#8B7FFF"/>

  <!-- Chest badge — "M" -->
  <circle cx="256" cy="310" r="22" fill="#0F0F1A" stroke="#5EE0A0" stroke-width="2.5"/>
  <text x="256" y="319" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#5EE0A0">M</text>

  <!-- Floating code particles -->
  <text x="370" y="130" font-family="monospace" font-size="18" fill="#8B7FFF" opacity="0.4">{}</text>
  <text x="110" y="140" font-family="monospace" font-size="14" fill="#5EE0A0" opacity="0.3">//</text>
  <text x="390" y="440" font-family="monospace" font-size="16" fill="#8B7FFF" opacity="0.3">;</text>
  <text x="100" y="420" font-family="monospace" font-size="18" fill="#5EE0A0" opacity="0.35">()</text>
</svg>
