<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ADA4FF"/>
      <stop offset="100%" stop-color="#8B7FFF"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161625"/>
      <stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0F0F1A"/>

  <!-- Antenna -->
  <line x1="256" y1="90" x2="256" y2="50" stroke="#5EE0A0" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="42" r="16" fill="#5EE0A0" filter="url(#g)"/>
  <circle cx="256" cy="42" r="8" fill="#FFF" opacity="0.7"/>

  <!-- Head -->
  <rect x="96" y="100" width="320" height="280" rx="64" fill="url(#hGrad)"/>

  <!-- Face screen -->
  <rect x="132" y="140" width="248" height="170" rx="36" fill="url(#sGrad)"/>
  <rect x="132" y="140" width="248" height="170" rx="36" fill="none" stroke="#3D3670" stroke-width="2.5"/>

  <!-- Eyes -->
  <rect x="178" y="188" width="48" height="56" rx="12" fill="#5EE0A0" filter="url(#g)"/>
  <rect x="286" y="188" width="48" height="56" rx="12" fill="#5EE0A0" filter="url(#g)"/>

  <!-- Eye shine -->
  <rect x="184" y="194" width="16" height="20" rx="5" fill="#FFF" opacity="0.4"/>
  <rect x="292" y="194" width="16" height="20" rx="5" fill="#FFF" opacity="0.4"/>

  <!-- Mouth — terminal prompt -->
  <text x="210" y="290" font-family="monospace" font-size="34" font-weight="bold" fill="#8B7FFF" opacity="0.85">&gt; _</text>

  <!-- Side vents -->
  <rect x="72" y="200" width="22" height="60" rx="11" fill="#8B7FFF" opacity="0.6"/>
  <rect x="418" y="200" width="22" height="60" rx="11" fill="#8B7FFF" opacity="0.6"/>

  <!-- Chest badge -->
  <circle cx="256" cy="420" r="32" fill="#0F0F1A" stroke="#5EE0A0" stroke-width="3"/>
  <text x="256" y="432" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="#5EE0A0">M</text>

  <!-- Code brackets flanking -->
  <text x="108" y="460" font-family="monospace" font-size="48" font-weight="bold" fill="#8B7FFF" opacity="0.25">&lt;</text>
  <text x="372" y="460" font-family="monospace" font-size="48" font-weight="bold" fill="#8B7FFF" opacity="0.25">/&gt;</text>
</svg>
